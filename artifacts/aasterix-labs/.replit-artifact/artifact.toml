kind = "web"
previewPath = "/"
title = "Aasterix Labs"
version = "1.0.0"
id = "artifacts/aasterix-labs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21586

[services.development]
run = "pnpm --filter @workspace/aasterix-labs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aasterix-labs", "run", "build" ]
publicDir = "artifacts/aasterix-labs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21586"
BASE_PATH = "/"
