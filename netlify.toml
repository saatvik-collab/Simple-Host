[build]
  base = "."
  command = "corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/aasterix-labs build"
  publish = "artifacts/aasterix-labs/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
  PORT = "3000"
  BASE_PATH = "/"
  PNPM_FLAGS = "--no-frozen-lockfile"
  NPM_FLAGS = "--no-frozen-lockfile"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
