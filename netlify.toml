[build]
  base = "."
  command = "corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter @workspace/aasterix-labs build"
  publish = "artifacts/aasterix-labs/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  PORT = "3000"
  BASE_PATH = "/"
  NODE_ENV = "production"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
